<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCSTORE | Premium Shopping Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --nc-navy: #131921;
            --nc-gold: #febd69;
            --nc-orange: #e47911;
        }

        body { font-family: 'Public Sans', sans-serif; background-color: #f0f2f2; color: #111; }
        .product-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: var(--nc-gold); }
        .hidden-view { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-16 md:pb-0">

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[5000]">
        <div class="bg-black text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border border-[#febd69]">
            <i class="fas fa-check-circle text-[#febd69]"></i>
            <span id="toast-msg" class="font-bold uppercase tracking-tight">Updated!</span>
        </div>
    </div>

    <header class="sticky top-0 z-[100] bg-[#131921] text-white">
        <div class="container mx-auto px-4 py-2 flex items-center justify-between">
            <a href="#" onclick="showHome()" class="flex flex-col">
                <span class="text-3xl font-black italic tracking-tighter">NC<span class="text-[#febd69]">STORE</span></span>
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Premium Hub</span>
            </a>
            
            <div onclick="toggleCart()" class="relative p-2 cursor-pointer border border-transparent hover:border-white rounded">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-[#e47911] text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </div>
        </div>
        <div class="bg-[#232f3e] px-4 py-2 text-xs font-bold uppercase flex gap-6 overflow-x-auto no-scrollbar">
            <a href="#" onclick="showHome()">Home</a>
            <a href="#">Audio</a>
            <a href="#">Computing</a>
            <a href="#">Gaming</a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <div id="home-view">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4" id="deals-grid">
                <p class="col-span-full text-center py-10">Loading items...</p>
            </div>
        </div>

        <div id="product-detail-view" class="hidden-view">
            <button onclick="showHome()" class="mb-6 font-bold text-gray-500 uppercase text-xs"><i class="fas fa-arrow-left mr-2"></i>Back</button>
            <div id="detail-content" class="bg-white rounded-3xl p-6 md:p-10 shadow-sm flex flex-col md:flex-row gap-10">
                </div>
        </div>
    </main>

    <div id="cart-drawer" class="fixed inset-0 z-[1100] hidden">
        <div class="absolute inset-0 bg-black/60" onclick="toggleCart()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white shadow-2xl flex flex-col">
            <div class="bg-[#131921] text-white p-5 flex justify-between items-center font-bold italic uppercase">
                <span>Your Basket</span>
                <button onclick="toggleCart()" class="text-2xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div class="p-6 border-t bg-gray-50">
                <div class="flex justify-between items-center mb-4 font-black text-xl italic uppercase">
                    <span>Total</span>
                    <span id="cart-total" class="text-red-700">Rs. 0</span>
                </div>
                <button onclick="checkoutWhatsApp()" class="w-full bg-[#ffa41c] hover:bg-[#f3a847] py-4 rounded-xl font-bold uppercase shadow-lg flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp text-xl"></i> Checkout via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        let storeItems = [];
        let cart = [];
        let activeProduct = null;

        // FETCH DATA
        async function loadStoreData() {
            try {
                const response = await fetch('data.json', { cache: 'no-store' });
                storeItems = await response.json();
                renderItems();
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('deals-grid').innerHTML = "Failed to load data. Please check data.json file.";
            }
        }

        function renderItems() {
            const grid = document.getElementById('deals-grid');
            grid.innerHTML = storeItems.map(item => `
                <div class="product-card p-4" onclick="showProductDetail(${item.id})">
                    <img src="${item.img}" class="w-full h-40 object-contain mb-4">
                    <p class="text-[10px] text-orange-600 font-bold uppercase">${item.category}</p>
                    <h3 class="text-sm font-bold line-clamp-2 mb-2 h-10">${item.name}</h3>
                    <p class="text-lg font-black italic">Rs. ${item.variants[0].price.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function showProductDetail(id) {
            activeProduct = storeItems.find(i => i.id === id);
            document.getElementById('home-view').classList.add('hidden-view');
            const detailView = document.getElementById('product-detail-view');
            detailView.classList.remove('hidden-view');
            
            document.getElementById('detail-content').innerHTML = `
                <div class="w-full md:w-1/2">
                    <img src="${activeProduct.img}" class="w-full h-auto object-contain bg-gray-50 rounded-2xl p-6">
                </div>
                <div class="w-full md:w-1/2 space-y-6">
                    <p class="text-blue-600 font-black uppercase text-xs">${activeProduct.category}</p>
                    <h1 class="text-3xl md:text-4xl font-black italic uppercase tracking-tighter">${activeProduct.name}</h1>
                    <p class="text-4xl font-black text-red-700">Rs. ${activeProduct.variants[0].price.toLocaleString()}</p>
                    <div class="text-gray-600 text-sm leading-relaxed">${activeProduct.description}</div>
                    <button onclick="addToCart()" class="w-full md:w-auto bg-[#febd69] px-10 py-4 rounded-xl font-black uppercase shadow-lg hover:bg-[#f3a847]">Add to Basket</button>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        function showHome() {
            document.getElementById('home-view').classList.remove('hidden-view');
            document.getElementById('product-detail-view').classList.add('hidden-view');
        }

        function addToCart() {
            cart.push({ ...activeProduct, price: activeProduct.variants[0].price });
            updateCartUI();
            showToast("Item added to basket!");
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex gap-4 bg-gray-50 p-3 rounded-xl border">
                        <img src="${item.img}" class="w-16 h-16 object-contain">
                        <div class="flex-1">
                            <h4 class="text-xs font-bold uppercase line-clamp-1">${item.name}</h4>
                            <p class="font-bold text-red-700">Rs. ${item.price.toLocaleString()}</p>
                            <button onclick="removeItem(${index})" class="text-[10px] text-gray-400 font-bold uppercase hover:text-red-500">Remove</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `Rs. ${total.toLocaleString()}`;
            document.getElementById('cart-count').innerText = cart.length;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('hidden');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        function checkoutWhatsApp() {
            if(cart.length === 0) return alert("Basket is empty!");
            let msg = `*New Order from NCSTORE*%0A%0A`;
            cart.forEach(i => msg += `• ${i.name} - Rs.${i.price.toLocaleString()}%0A`);
            msg += `%0A*Total: ${document.getElementById('cart-total').innerText}*`;
            window.open(`https://wa.me/94771234567?text=${msg}`); // මෙතන ඔබේ අංකය දාන්න
        }

        window.onload = loadStoreData;
    </script>
</body>
</html>
